<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Accessible Interactive Photo Gallery</title>

    <link rel="stylesheet" href="style.css">
</head>

<body onload="addTabFocus()">
    <main>
        <h1>Accessible Interactive Photo Gallery</h1>

        <div id="image" aria-live="polite">
            Hover over or focus on an image below to display here.
        </div>

        <div class="gallery">
            <img
                class="preview"
                src="https://picsum.photos/id/1015/500/300"
                alt="Mountain landscape beside a blue river"
                onmouseover="upDate(this)"
                onmouseout="unDo()"
                onfocus="upDate(this)"
                onblur="unDo()"
            >

            <img
                class="preview"
                src="https://picsum.photos/id/1016/500/300"
                alt="Rocky mountain landscape at sunset"
                onmouseover="upDate(this)"
                onmouseout="unDo()"
                onfocus="upDate(this)"
                onblur="unDo()"
            >

            <img
                class="preview"
                src="https://picsum.photos/id/1025/500/300"
                alt="Dog sitting outdoors wrapped in a blanket"
                onmouseover="upDate(this)"
                onmouseout="unDo()"
                onfocus="upDate(this)"
                onblur="unDo()"
            >

            <img
                class="preview"
                src="https://picsum.photos/id/1035/500/300"
                alt="Waterfall with a rainbow in front"
                onmouseover="upDate(this)"
                onmouseout="unDo()"
                onfocus="upDate(this)"
                onblur="unDo()"
            >

            <img
                class="preview"
                src="https://picsum.photos/id/1043/500/300"
                alt="Forest and mountains beside a calm lake"
                onmouseover="upDate(this)"
                onmouseout="unDo()"
                onfocus="upDate(this)"
                onblur="unDo()"
            >

            <img
                class="preview"
                src="https://picsum.photos/id/1069/500/300"
                alt="Orange jellyfish swimming in blue water"
                onmouseover="upDate(this)"
                onmouseout="unDo()"
                onfocus="upDate(this)"
                onblur="unDo()"
            >
        </div>
    </main>

    <script src="gallery.js"></script>
</body>
</html>
